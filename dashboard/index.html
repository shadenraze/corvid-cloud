<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corvid</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --text-dim: #999;
    --bar-bg: #2a2a4a;
    --bar-hunger: #e94560;
    --bar-energy: #f5c518;
    --bar-happy: #53d769;
    --bar-stress: #ff3b30;
    --bar-curiosity: #5ac8fa;
    --bar-trust: #af52de;
    --bar-lonely: #64d2ff;
    --bar-bored: #ff9500;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 600;
  }

  .header .portrait {
    font-size: 16px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .card {
    background: var(--surface);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .card h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }

  .stat-label {
    width: 80px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .stat-bar {
    flex: 1;
    height: 8px;
    background: var(--bar-bg);
    border-radius: 4px;
    overflow: hidden;
    margin: 0 8px;
  }

  .stat-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .stat-value {
    width: 40px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }

  .interact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
  }

  .interact-btn {
    background: var(--surface2);
    border: none;
    border-radius: 8px;
    color: var(--text);
    padding: 10px 4px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .interact-btn:hover {
    background: var(--accent);
  }

  .interact-btn:active {
    transform: scale(0.95);
  }

  .response-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
    min-height: 60px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
  }

  .species-grid { display: flex; flex-direction: column; gap: 8px; }
  .species-option {
    display: flex; align-items: center; gap: 12px;
    padding: 10px; border-radius: 8px;
    background: var(--surface); cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.2s;
  }
  .species-option:hover { border-color: var(--accent); }
  .species-option.selected { border-color: var(--accent); background: #1a2a4e; }
  .species-option .species-emoji { font-size: 1.8em; }
  .species-option small { color: var(--muted); }
  .chem-sliders { display: flex; flex-direction: column; gap: 10px; }
  .chem-slider-row { display: flex; flex-direction: column; gap: 2px; }
  .chem-slider-label { display: flex; justify-content: space-between; font-size: 0.9em; }
  .chem-range {
    width: 100%; height: 6px; -webkit-appearance: none; appearance: none;
    background: #2a2a5a; border-radius: 3px; outline: none;
  }
  .chem-range::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    background: var(--accent); border-radius: 50%; cursor: pointer;
  }
  .pet-switcher { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .pet-switcher select {
    background: var(--surface); color: var(--text); border: 1px solid #4a4a8a;
    padding: 4px 8px; border-radius: 4px; font-size: 0.9em;
  }
  .switch-btn {
    background: var(--accent); color: white; border: none; padding: 4px 10px;
    border-radius: 4px; cursor: pointer; font-size: 1em;
  }

  .response-box .mood-tag {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  .collection-list {
    max-height: 200px;
    overflow-y: auto;
  }

  .collection-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--bar-bg);
    font-size: 13px;
  }

  .collection-item:last-child {
    border-bottom: none;
  }

  .item-sparkle {
    font-size: 10px;
    color: var(--text-dim);
  }

  .treasured { color: #f5c518; }

  .meta {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 16px;
  }

  .loading {
    text-align: center;
    color: var(--text-dim);
    padding: 40px;
  }

  @media (max-width: 480px) {
    .stat-label { width: 65px; font-size: 12px; }
    .interact-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading">Loading...</div>
</div>

<div id="response-container" style="display:none">
  <div class="card">
    <h2>Response</h2>
    <div class="response-box" id="response"></div>
  </div>
</div>

<script>
// === CONFIG ===
// Set your deployed worker URL here, or enter it in the dashboard
const API_URL = localStorage.getItem('corvid_api_url')
  || (window.location.hostname === 'localhost' ? 'http://localhost:8787' : '');
let PET_ID = localStorage.getItem('corvid_pet_id') || 'scrit';

function getPetList() {
  try { return JSON.parse(localStorage.getItem('corvid_pets') || '[]'); } catch { return []; }
}
function savePetList(pets) {
  localStorage.setItem('corvid_pets', JSON.stringify(pets));
}
function registerPet(id, name) {
  const pets = getPetList();
  if (!pets.find(p => p.id === id)) {
    pets.push({ id, name });
    savePetList(pets);
  }
}
const SHARED_SECRET = ''; // set if auth enabled

const HEADERS = {
  'Content-Type': 'application/json',
  ...(SHARED_SECRET ? { 'Authorization': `Bearer ${SHARED_SECRET}` } : {}),
};

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: HEADERS };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API_URL}${path}`, opts);
  return res.json();
}

function renderDrive(name, value, color) {
  const pct = Math.round(value * 100);
  return `
    <div class="stat-row">
      <span class="stat-label">${name}</span>
      <div class="stat-bar">
        <div class="stat-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <span class="stat-value">${pct}%</span>
    </div>
  `;
}

function renderApp(status) {
  const ageStr = status.ageHours < 24
    ? `${status.ageHours}h old`
    : `${(status.ageHours / 24).toFixed(1)}d old`;

  document.getElementById('app').innerHTML = `
    <div class="header">
      ${petSwitcherHTML()}
      <h1>${status.species?.emoji || ''} ${status.name} <span style="cursor:pointer;font-size:0.6em;opacity:0.5" onclick="showSettings()">⚙️</span></h1>
      <div class="portrait">${status.species ? status.species.name + ' · ' : ''}${status.isSleeping ? '💤 sleeping' : status.mood} · ${ageStr} · ${status.totalInteractions} interactions
        <span style="cursor:pointer;opacity:0.4;margin-left:8px" onclick="deletePet()" title="Delete pet">🗑️</span>
      </div>
    </div>

    <div class="card">
      <h2>Chemistry</h2>
      ${renderDrive('Hunger', status.drives.hunger, 'var(--bar-hunger)')}
      ${renderDrive('Energy', status.drives.energy, 'var(--bar-energy)')}
      ${renderDrive('Happy', status.drives.happiness, 'var(--bar-happy)')}
      ${renderDrive('Stress', status.drives.stress, 'var(--bar-stress)')}
      ${renderDrive('Curiosity', status.drives.curiosity, 'var(--bar-curiosity)')}
      ${renderDrive('Trust', status.drives.trust, 'var(--bar-trust)')}
      ${renderDrive('Lonely', status.drives.loneliness, 'var(--bar-lonely)')}
      ${renderDrive('Bored', status.drives.boredom, 'var(--bar-bored)')}
    </div>

    <div class="card">
      <h2>Interact</h2>
      <div class="interact-grid">
        <button class="interact-btn" onclick="doInteract('feed')">🍖 Feed</button>
        <button class="interact-btn" onclick="doInteract('pet')">✋ Pet</button>
        <button class="interact-btn" onclick="doInteract('talk')">💬 Talk</button>
        <button class="interact-btn" onclick="doInteract('poke')">👆 Poke</button>
        <button class="interact-btn" onclick="doPlay('chase')">🏃 Chase</button>
        <button class="interact-btn" onclick="doWords()">📝 Words</button>
        <button class="interact-btn" onclick="doGift()">🎁 Gift</button>
        <button class="interact-btn" onclick="doTrade()">🔄 Trade</button>
        <button class="interact-btn" onclick="doPlay('puzzle')">🧩 Puzzle</button>
        <button class="interact-btn" onclick="doPlay('tug')">🪢 Tug</button>
        <button class="interact-btn" onclick="doPlay('hide')">👁️ Hide</button>
        <button class="interact-btn" onclick="doPlay('wrestle')">🤼 Wrestle</button>
      </div>
    </div>



    <div class="card">
      <h2>Nest (${status.collectionSize} items)</h2>
      <div class="collection-list" id="collection">
        <div class="loading">Loading collection...</div>
      </div>
    </div>

    <div class="meta">
      ${status.treasuredCount} treasured · ${status.totalCollected} collected · ${status.totalGifted} gifted
    </div>
  `;

  loadCollection();
}

async function loadCollection() {
  try {
    const data = await api(`/pet/${PET_ID}/collection`);
    const el = document.getElementById('collection');
    if (!el) return;
    el.innerHTML = data.items.map(item => `
      <div class="collection-item ${item.treasured ? 'treasured' : ''}">
        <span>${item.treasured ? '⭐ ' : ''}"${item.content}"</span>
        <span class="item-sparkle">${item.source}</span>
      </div>
    `).join('');
  } catch (e) {
    console.error('Failed to load collection:', e);
  }
}

async function doInteract(action) {
  try {
    const data = await api(`/pet/${PET_ID}/interact`, 'POST', { action });
    showResponse(data);
    refreshStatus();
  } catch (e) {
    console.error('Interact failed:', e);
  }
}

async function doPlay(type) {
  try {
    const data = await api(`/pet/${PET_ID}/play`, 'POST', { type });
    showResponse(data);
    refreshStatus();
  } catch (e) {
    console.error('Play failed:', e);
  }
}

function showResponse(data) {
  const container = document.getElementById('response-container');
  const el = document.getElementById('response');
  if (el && container) {
    el.innerHTML = `
      ${data.message || '...'}
      <div class="mood-tag">${data.mood || ''}</div>
    `;
    container.style.display = 'block';
  }
}

async function refreshStatus() {
  try {
    const status = await api(`/pet/${PET_ID}/status`);
    renderApp(status);
  } catch (e) {
    console.error('Refresh failed:', e);
  }
}

// Initial load
if (!API_URL) {
  showSettings();
} else {
  api(`/pet/${PET_ID}/status`)
    .then(renderApp)
    .catch(() => {
      document.getElementById('app').innerHTML = `
        <div class="header"><h1>Corvid</h1></div>
        <div class="card">
          <div class="response-box">
            No pet found. Create one?<br><br>
            <button class="interact-btn" onclick="createPet()">Create Pet</button>
          </div>
        </div>
      `;
    });
}

function showSettings() {
  document.getElementById('app').innerHTML = `
    <div class="header"><h1>Corvid</h1></div>
    <div class="card">
      <div class="response-box">
        <strong>Setup</strong><br><br>
        Enter your Cloudflare Worker URL:<br><br>
        <input id="api-url-input" type="text" placeholder="https://your-pet.your-subdomain.workers.dev"
          style="width:100%;padding:8px;background:#1a1a2e;border:1px solid #4a4a8a;color:#e0e0ff;border-radius:4px;margin-bottom:8px;"
          value="${API_URL || ''}">
        <br>
        Pet ID (default: scrit):<br>
        <input id="pet-id-input" type="text" placeholder="scrit"
          style="width:100%;padding:8px;background:#1a1a2e;border:1px solid #4a4a8a;color:#e0e0ff;border-radius:4px;margin-bottom:8px;"
          value="${PET_ID}">
        <br>
        <button class="interact-btn" onclick="saveSettings()">Connect</button>
      </div>
    </div>
  `;
}

function saveSettings() {
  const url = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
  const petId = document.getElementById('pet-id-input').value.trim() || 'scrit';
  if (!url) { alert('Enter a Worker URL'); return; }
  localStorage.setItem('corvid_api_url', url);
  localStorage.setItem('corvid_pet_id', petId);
  location.reload();
}

async function createPet() {
  // Fetch available species
  let species = [];
  try {
    species = await api('/species');
  } catch (e) { /* fallback to no species */ }

  const speciesOptions = species.map(s =>
    `<label class="species-option" onclick="selectSpecies('${s.id}')">
      <div class="species-emoji">${s.emoji}</div>
      <div><strong>${s.name}</strong><br><small>${s.description}</small></div>
      <input type="radio" name="species" value="${s.id}" style="display:none">
    </label>`
  ).join('');

  const customOption = `
    <label class="species-option" onclick="selectSpecies('custom')">
      <div class="species-emoji">✨</div>
      <div><strong>Custom</strong><br><small>Define your own creature</small></div>
      <input type="radio" name="species" value="custom" style="display:none">
    </label>
  `;

  document.getElementById('app').innerHTML = `
    <div class="header"><h1>Corvid</h1></div>
    <div class="card">
      <div class="response-box">
        <strong>Create Your Pet</strong><br><br>
        Name:<br>
        <input id="name-input" type="text" placeholder="Scrit" value="Scrit"
          style="width:100%;padding:8px;background:#1a1a2e;border:1px solid #4a4a8a;color:#e0e0ff;border-radius:4px;margin-bottom:12px;">
        <strong>Species:</strong><br><br>
        <div class="species-grid">${speciesOptions}${customOption}</div>
        <input type="hidden" id="species-input" value="${species[0]?.id || ''}">
        <div id="custom-species-form" style="display:none">
          <br>
          <input id="custom-name" type="text" placeholder="Species name (e.g. Mushroom Sprite)"
            style="width:100%;padding:8px;background:#1a1a2e;border:1px solid #4a4a8a;color:#e0e0ff;border-radius:4px;margin-bottom:6px;">
          <input id="custom-emoji" type="text" placeholder="Emoji (e.g. 🍄)"
            style="width:100%;padding:8px;background:#1a1a2e;border:1px solid #4a4a8a;color:#e0e0ff;border-radius:4px;margin-bottom:6px;">
          <input id="custom-desc" type="text" placeholder="One-line description"
            style="width:100%;padding:8px;background:#1a1a2e;border:1px solid #4a4a8a;color:#e0e0ff;border-radius:4px;margin-bottom:6px;">
          <input id="custom-words" type="text" placeholder="Shiny words (comma separated)"
            style="width:100%;padding:8px;background:#1a1a2e;border:1px solid #4a4a8a;color:#e0e0ff;border-radius:4px;margin-bottom:6px;">
          <input id="custom-objects" type="text" placeholder="Found objects (comma separated)"
            style="width:100%;padding:8px;background:#1a1a2e;border:1px solid #4a4a8a;color:#e0e0ff;border-radius:4px;margin-bottom:12px;">
          <strong>Starting Chemistry</strong><br><small style="color:var(--muted)">Sets initial personality. Evolves organically from here.</small><br><br>
          <div class="chem-sliders">
            ${chemSlider('Dopamine', 'chem-dopamine', 0.3, 'Pleasure, reward, motivation')}
            ${chemSlider('Oxytocin', 'chem-oxytocin', 0.2, 'Bonding, trust, comfort')}
            ${chemSlider('Serotonin', 'chem-serotonin', 0.4, 'Mood, calm, contentment')}
            ${chemSlider('Cortisol', 'chem-cortisol', 0.1, 'Stress, alertness, vigilance')}
            ${chemSlider('Melatonin', 'chem-melatonin', 0.0, 'Sleepiness, nocturnal rhythm')}
            ${chemSlider('Adrenaline', 'chem-adrenaline', 0.0, 'Excitement, fear, startle')}
            ${chemSlider('Glucose', 'chem-glucose', 0.7, 'Energy, vitality')}
          </div>
        </div>
        <br>
        <button class="interact-btn" onclick="submitCreate()">Create</button>
      </div>
    </div>
  `;
}

function petSwitcherHTML() {
  const pets = getPetList();
  if (pets.length <= 1) return '';
  return `<div class="pet-switcher">
    <select onchange="switchPet(this.value)">
      ${pets.map(p => `<option value="${p.id}" ${p.id === PET_ID ? 'selected' : ''}>${p.name || p.id}</option>`).join('')}
    </select>
    <button class="switch-btn" onclick="showNewPetForm()">+</button>
  </div>`;
}

function switchPet(id) {
  PET_ID = id;
  localStorage.setItem('corvid_pet_id', id);
  refreshStatus();
}

function showNewPetForm() {
  document.getElementById('response-container').style.display = 'none';
  createPet();
}

async function deletePet() {
  if (!confirm(`Delete ${PET_ID}? This cannot be undone.`)) return;
  try {
    await api(`/pet/${PET_ID}`, 'DELETE');
    const pets = getPetList().filter(p => p.id !== PET_ID);
    savePetList(pets);
    if (pets.length > 0) {
      PET_ID = pets[0].id;
      localStorage.setItem('corvid_pet_id', PET_ID);
      refreshStatus();
    } else {
      PET_ID = 'scrit';
      localStorage.setItem('corvid_pet_id', PET_ID);
      location.reload();
    }
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

function chemSlider(label, id, defaultVal, desc) {
  const pct = Math.round(defaultVal * 100);
  return `<div class="chem-slider-row">
    <div class="chem-slider-label">${label} <span id="${id}-val">${pct}%</span></div>
    <input type="range" id="${id}" min="0" max="100" value="${pct}"
      oninput="document.getElementById('${id}-val').textContent=this.value+'%'"
      class="chem-range">
    <small style="color:var(--muted)">${desc}</small>
  </div>`;
}

async function doWords() {
  const text = prompt('Feed your pet some words:');
  if (!text) return;
  try {
    const data = await api(`/pet/${PET_ID}/words`, 'POST', { text });
    showResponse(data);
    refreshStatus();
  } catch (e) { console.error('Words failed:', e); }
}

async function doGift() {
  const content = prompt('Give your pet something:');
  if (!content) return;
  try {
    const data = await api(`/pet/${PET_ID}/gift`, 'POST', { content });
    showResponse(data);
    refreshStatus();
  } catch (e) { console.error('Gift failed:', e); }
}

async function doTrade() {
  const offered = prompt('Offer something in trade:');
  if (!offered) return;
  try {
    const data = await api(`/pet/${PET_ID}/trade`, 'POST', { offering: offered });
    showResponse(data);
    refreshStatus();
  } catch (e) { console.error('Trade failed:', e); }
}

function selectSpecies(id) {
  document.querySelectorAll('.species-option').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('species-input').value = id;
  document.getElementById('custom-species-form').style.display = id === 'custom' ? 'block' : 'none';
}

async function submitCreate() {
  const name = document.getElementById('name-input').value.trim() || 'Scrit';
  const speciesId = document.getElementById('species-input').value;

  if (speciesId === 'custom') {
    const customName = document.getElementById('custom-name').value.trim() || 'Unknown';
    const customEmoji = document.getElementById('custom-emoji').value.trim() || '🐾';
    const customDesc = document.getElementById('custom-desc').value.trim() || 'A unique creature.';
    const customWords = document.getElementById('custom-words').value.split(',').map(s => s.trim()).filter(Boolean);
    const customObjects = document.getElementById('custom-objects').value.split(',').map(s => s.trim()).filter(Boolean);
    const customId = customName.toLowerCase().replace(/\s+/g, '-');
    const getVal = id => parseInt(document.getElementById(id)?.value || '0') / 100;
    await api(`/pet/${PET_ID}/init`, 'POST', {
      name,
      species: {
        id: customId,
        name: customName,
        emoji: customEmoji,
        description: customDesc,
        shinyWords: customWords,
        foundObjects: customObjects,
        startingChemistry: {
          dopamine: getVal('chem-dopamine'),
          oxytocin: getVal('chem-oxytocin'),
          serotonin: getVal('chem-serotonin'),
          cortisol: getVal('chem-cortisol'),
          melatonin: getVal('chem-melatonin'),
          adrenaline: getVal('chem-adrenaline'),
          glucose: getVal('chem-glucose'),
        }
      }
    });
  } else {
    await api(`/pet/${PET_ID}/init`, 'POST', { name, speciesId: speciesId || undefined });
  }
  registerPet(PET_ID, name);
  refreshStatus();
}

// Auto-refresh every 5 minutes
setInterval(refreshStatus, 5 * 60 * 1000);
</script>
</body>
</html>
